#first need to do aws configure, pip3.9 install botocore boto3 netaddr
- name: Creating / Deleting EC2 instances for roboshop project using Ansible playbook
  hosts: local
  connection: local
  vars:
    instances: [ "mongodb", "redis", "mysql", "rabbitmq", "catalogue", "user", "cart", "shipping", "payment", "frontend" ]
    image_id: ami-0220d79f3f480ecf5
    domain_name: trivikram.online
    action: create

  tasks:
  - name : Creating EC2 instances
    loop: "{{ instances }}"
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      image_id: "{{ image_id }}"
      instance_type: t3.micro
      security_groups: 
      - "{{item}}"
      - common
    register: ec2_output
    when: action == "create"

  #- name:
    #debug:
      #msg: " {{ ec2_output.results }}"
      #var: ec2_output.results

  #- name: Print Instance Name
    #debug: 
      #msg: " Instance Name : {{ item.item }} Private IP: {{ item.instances[0].private_ip_address }} "
    #loop: "{{ ec2_output.results }}"

  - name: create R53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}.{{ domain_name }}" #mongodb.trivikram.online
      type: A
      value: "{{ item.instances[0].private_ip_address }}"
      ttl: 1
      overwrite: true # old records ni overwrite chesthundi
    loop: "{{ ec2_output.results }}"
    when: 
    - action == "create"
    - instances != "frontend"


  - name: create R53 records for frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ domain_name }}" # trivikram.online
      type: A
      value: "{{ item.instances[0].public_ip_address }}"
      ttl: 1
      overwrite: true # old records ni overwrite chesthundi
    loop: "{{ ec2_output.results }}"
    when: 
    - item.item == "frontend"
    - action == "create"

  - name: delete R53 record
    amazon.aws.route53:
      zone: "{{ domain_name }}"
      state: absent
      record: "{{ item }}.{{ domain_name }}" 
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when: action == "delete"

  - name: delete R53 records for frontend
    amazon.aws.route53:
      zone: "{{ domain_name }}"
      state: absent
      record: "{{ domain_name }}"
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when: 
    - action == "delete"
    - item == "frontend"

  - name: delete EC2 instances
    amazon.aws.ec2_instance:
      state: absent
      name: "{{ item }}"
      wait: false
    loop: "{{ instances }}"
    when: action == "delete"